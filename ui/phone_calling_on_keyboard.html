<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link type="text/css" rel="stylesheet" href="css/style.css" />
		<title>蓝牙电话</title>
	</head>

	<body>
		<div id="box" class="boxin">
			<div class="top">
				<div class="top_icon_home top_icon"><a href="index.html"></a></div>
				<h1>蓝牙电话</h1>
				<div class="top_icon">
					<ul>
						<li></li>
						<li></li>
						<li><span>10</span></li>
						<li>10:20</li>
					</ul>
				</div>
			</div>

			<div class="phone_calling_con">
				<div class="phone_calling_btn">

					<ul>
						<li onclick="window.location.href='phone_dial_keyboard.html'">挂断</li>
						<li style="display: none;">接听</li>
					</ul>
				</div>
				<div class="phone_calling_msg">
					<dl>
						<dt><img src="images/pic_calling_user.png" /></dt>
						<dd>
							<p class="num">18800001234</p>
							<p class="state">
								<span>通话中...</span>
								<span>03:12</span>
							</p>
						</dd>

					</dl>
				</div>
			</div>
			<div class="radio_search_con phone_dial_con" style="margin-top: 0;">

				<div class="radio_search_keybord phone_dial_keybord">
					<ul>
						<li>1</li>
						<li><span>2</span><span>ABC</span></li>
						<li><span>3</span><span>DEF</span></li>
						<li><span>4</span><span>GHI</span></li>
						<li><span>5</span><span>JKL</span></li>
						<li><span>6</span><span>MNO</span></li>
						<li><span>7</span><span>PQRS</span></li>
						<li><span>8</span><span>TUV</span></li>
						<li><span>9</span><span>WXWZ</span></li>
						<li style="line-height: 120px;font-size: 64px;">*</li>
						<li><span>0</span><span>+</span></li>
						<li>#</li>


					</ul>
					<div class="radio_search_enter" onclick="window.location.href='phone_calling_on.html'">
						隐藏
					</div>

				</div>

			</div>




		</div>
	</body>
</html>

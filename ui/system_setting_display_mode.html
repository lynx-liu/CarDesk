<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link type="text/css" rel="stylesheet" href="css/style.css" />
		<title>系统设置</title>
	</head>
	<body>
		<div id="box" class="boxin">
			<div class="top">
				<div class="top_icon_home top_icon"><a href="index.html"></a></div>
				<h1>系统设置</h1>
				<div class="top_icon">
					<ul>
						<li></li>
						<li></li>
						<li><span>10</span></li>
						<li>10:20</li>
					</ul>
				</div>
			</div>

			<div class="driving_image_setting system_setting">
				<div class="subnav">
					<ul>
						<li class="on">显示模式</li>
						<li onclick="window.location.href='system_setting_sound.html'">声音设置</li>
						<li onclick="window.location.href='system_setting_bluetooth_open.html'">蓝牙设置</li>
						<li onclick="window.location.href='system_setting_system_infor.html'">系统信息</li>
						<li onclick="window.location.href='system_setting_factory_settings.html'">出厂设置</li>
						<li onclick="window.location.href='system_setting_system_update.html'">系统更新</li>

					</ul>
				</div>
				<div class="driving_image_setting_con system_setting_con">
					<ul class="setting_list">
						<li class="setting_brightness">
							<dl>
								<dt>亮度模式</dt>
								<dd>

									<ul class="setting_brightness_tab">
										<li class="on">白天</li>
										<li>夜晚</li>
										<li>自动</li>
									</ul>
									<div class="brightness_pro">
										<span class="mark"><img src="images/pict_brightness_mark.png" /></span>
										<span class="tips">50</span>

										<img src="images/pro_brightness.png" />

									</div>
								</dd>

							</dl>

						</li>
						<li>
							<dl>
								<dt>关屏时钟</dt>
								<dd>

									<ul class="setting_btn ">
										<li>数字</li>

										<li>模拟</li>
									</ul>

								</dd>

							</dl>

						</li>
						<li>
							<dl>
								<dt>时钟制式</dt>
								<dd>
						
									<ul class="setting_btn ">
										<li>12小时</li>
						
										<li>24小时</li>
									</ul>
						
								</dd>
						
							</dl>
						
						</li>
						

					</ul>
				</div>
			</div>


		</div>




	</body>
</html>

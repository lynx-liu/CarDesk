<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link type="text/css" rel="stylesheet" href="css/style.css" />

	</head>
	<body>
		<div id="box" class="boxin">
			<div class="top">
				<div class="top_icon_home top_icon"><a href="index.html"></a></div>

				<div class="top_icon">

						<li></li>

			</div>

<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<link type="text/css" rel="stylesheet" href="css/style.css" />
		<title>系统设置</title>
	</head>
	<body>
		<div id="box" class="boxin">
			<div class="top">
				<div class="top_icon_home top_icon"><a href="index.html"></a></div>
				<h1>系统设置</h1>
				<div class="top_icon">
					<ul>
						<li></li>
						<li></li>
						<li><span>10</span></li>
						<li>10:20</li>
					</ul>
				</div>
			</div>

			<div class="driving_image_setting system_setting">
				<div class="subnav">
					<ul>
						<li onclick="window.location.href='system_setting_display_mode.html'">显示模式</li>
						<li onclick="window.location.href='system_setting_sound.html'">声音设置</li>
						<li class="on">蓝牙设置</li>
						<li onclick="window.location.href='system_setting_system_infor.html'">系统信息</li>
						<li onclick="window.location.href='system_setting_factory_settings.html'">出厂设置</li>
						<li onclick="window.location.href='system_setting_system_update.html'">系统更新</li>

					</ul>
				</div>
				<div class="driving_image_setting_con system_setting_con">
					<div class="tab phone_tab bluetooth_tab">
						<ul>
							<li onclick="window.location.href='system_setting_bluetooth_open.html'">蓝牙开启</li>
							<li onclick="window.location.href='system_setting_bluetooth_device.html'">匹配设备</li>
							<li onclick="window.location.href='system_setting_bluetooth_device_del.html'">删除设备</li>
							<li class="on">密码设置</li>

						</ul>
					</div>

					<div class="radio_search_con phone_dial_con bluetooth_passward">
						<div>
							<input type="number" value="1234" />
							<span></span>
						</div>
						<div class="radio_search_keybord phone_dial_keybord">
							<ul>
								<li>1</li>
								<li><span>2</span><span>ABC</span></li>
								<li><span>3</span><span>DEF</span></li>
								<li><span>4</span><span>GHI</span></li>
								<li><span>5</span><span>JKL</span></li>
								<li><span>6</span><span>MNO</span></li>
								<li><span>7</span><span>PQRS</span></li>
								<li><span>8</span><span>TUV</span></li>
								<li><span>9</span><span>WXWZ</span></li>
								<li style="line-height: 120px;font-size: 64px;">*</li>
								<li><span>0</span><span>+</span></li>
								<li>#</li>


							</ul>
							<div class="phone_dial_btn">
								<ul>
									<li></li>
									<li onclick="window.location.href='phone_calling_on.html'">确认</li>
								</ul>

							</div>

						</div>

					</div>

				</div>
			</div>


		</div>




	</body>
</html>
